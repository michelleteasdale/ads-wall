<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <defs>
    <linearGradient id="logo-g" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="logo-card" x1="6" y1="8" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect width="36" height="36" rx="8" y="2" fill="url(#logo-g)"/>
  <!-- Back card -->
  <g transform="translate(18,20) rotate(-6) translate(-18,-20)">
    <rect x="7" y="10" width="22" height="14" rx="3" fill="#ffffff" fill-opacity="0.25"/>
  </g>
  <!-- Front card -->
  <rect x="7" y="12" width="22" height="14" rx="3" fill="url(#logo-card)"/>
  <!-- Chip -->
  <rect x="10" y="15.5" width="5" height="4" rx="1" fill="#E8C84A" fill-opacity="0.8"/>
  <!-- Card line -->
  <rect x="10" y="21" width="10" height="1.5" rx="0.75" fill="#2563EB" fill-opacity="0.3"/>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="44" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF">Cardium</text>
</svg>
